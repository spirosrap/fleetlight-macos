name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - name: Privacy gate
        run: zsh Scripts/privacy_check.sh
      - name: Build
        run: swift build
      - name: Self-test
        run: swift run FleetlightSelfTest
